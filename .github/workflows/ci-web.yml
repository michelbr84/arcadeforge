name: CI — Web & API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- Dependency Review (PR only) ---
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # --- Web Frontend ---
  web-build:
    name: Web Build & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm --filter @arcadeforge/web build

  # --- API Unit Tests (no DB required) ---
  api-unit:
    name: API Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: |
          cd apps/api
          pip install -e ".[dev]"

      - name: Run unit tests (no DB)
        run: |
          cd apps/api
          python -m pytest tests/test_auth_passwords.py tests/test_generator.py tests/test_scanner.py -v --tb=short

  # --- API Integration Tests (with Postgres + Redis) ---
  api-integration:
    name: API Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arcadeforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/arcadeforge_test
      # Set explicitly so conftest.py does not fall back to its brittle URL-rewrite path
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/arcadeforge_test
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: test
      APP_SECRET_KEY: test-secret-key-for-ci

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: |
          cd apps/api
          pip install -e ".[dev]"

      - name: Run Alembic migrations
        run: |
          cd apps/api
          python -m alembic upgrade head

      - name: Run all tests
        run: |
          cd apps/api
          python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: apps/api/test-results.xml
