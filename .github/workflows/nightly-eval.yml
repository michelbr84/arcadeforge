name: Nightly Evaluation

on:
  schedule:
    # Run at 03:00 UTC every day
    - cron: "0 3 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  eval:
    name: Game Generation & Validation Eval
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arcadeforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/arcadeforge
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: test
      APP_SECRET_KEY: nightly-eval-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: |
          cd apps/api
          pip install -e ".[dev]"

      - name: Run Alembic migrations
        run: |
          cd apps/api
          python -m alembic upgrade head

      - name: Run full test suite
        run: |
          cd apps/api
          python -m pytest tests/ -v --tb=long --junitxml=nightly-results.xml

      - name: Evaluate game generation (all genres)
        run: |
          cd apps/api
          python -c "
          from app.games.generator import generate_game
          from app.games.scanner import scan_code

          genres = ['shooter', 'puzzle', 'sports', 'platformer']
          difficulties = ['easy', 'medium', 'hard']

          results = []
          for genre in genres:
              for diff in difficulties:
                  try:
                      result = generate_game(genre, f'Nightly {genre} ({diff})', f'A {genre} game for nightly eval', diff)
                      scan = scan_code(result.files.get('main.py', ''))
                      status = 'PASS' if scan.passed else 'FAIL'
                      results.append(f'{genre}/{diff}: {status} ({len(result.files[\"main.py\"])} bytes, {scan.critical_count}C/{scan.high_count}H findings)')
                  except Exception as e:
                      results.append(f'{genre}/{diff}: ERROR ({e})')

          print('=== Nightly Game Generation Eval ===')
          for r in results:
              print(r)

          failures = [r for r in results if 'FAIL' in r or 'ERROR' in r]
          if failures:
              print(f'\n{len(failures)} FAILURES')
              exit(1)
          else:
              print(f'\nAll {len(results)} combinations passed')
          "

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-eval-results
          path: apps/api/nightly-results.xml
