name: CI/CD — Test & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arcadeforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        working-directory: apps/api
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: apps/api
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/arcadeforge_test
          REDIS_URL: redis://localhost:6379/0
          APP_SECRET_KEY: test-secret-key-not-for-production
        run: pytest -v

  deploy-api:
    name: Deploy API to Fly.io
    runs-on: ubuntu-latest
    needs: api-tests

    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API
        working-directory: apps/api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

  deploy-workers:
    name: Deploy Workers to Fly.io
    runs-on: ubuntu-latest
    needs: api-tests

    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Workers
        working-directory: workers
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

  deploy-sandbox:
    name: Deploy Sandbox to Fly.io
    runs-on: ubuntu-latest
    needs: api-tests
    if: |
      contains(
        join(github.event.commits.*.modified, ','),
        'services/sandbox-runtime/'
      ) || contains(
        join(github.event.commits.*.added, ','),
        'services/sandbox-runtime/'
      )

    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Sandbox
        working-directory: services/sandbox-runtime
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only
