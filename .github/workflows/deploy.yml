name: CI — Test on Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arcadeforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        working-directory: apps/api
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: apps/api
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/arcadeforge_test
          # Set explicitly so conftest.py does not fall back to its brittle URL-rewrite path
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/arcadeforge_test
          REDIS_URL: redis://localhost:6379/0
          APP_SECRET_KEY: test-secret-key-not-for-production
        run: pytest -v

# Deployment is handled automatically:
# - Render: auto-deploys API on push to main (connected via GitHub)
# - Vercel: auto-deploys frontend on push to main (connected via GitHub)
