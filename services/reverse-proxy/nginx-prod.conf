upstream api {
    server api:8000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP — redirect to HTTPS + ACME challenge
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/arcadeforge.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arcadeforge.io/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API
    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Play session WebSocket
    location /play/ws/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    # Static assets (CDN-ready with assetPrefix)
    location /_next/static/ {
        alias /var/www/static/_next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend (proxy to Next.js or serve static export)
    location / {
        # For SSR: proxy to Next.js server
        # For static export: serve from /var/www/html
        try_files $uri $uri.html /index.html;
    }
}
