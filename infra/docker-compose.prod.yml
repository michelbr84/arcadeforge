services:
  postgres:
    image: postgres:16-alpine
    container_name: arcadeforge-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-arcadeforge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No port exposed — internal only

  redis:
    image: redis:7-alpine
    container_name: arcadeforge-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No port exposed — internal only

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: arcadeforge-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_BASE_URL: ${APP_BASE_URL}
      API_BASE_URL: ${API_BASE_URL}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-arcadeforge}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CORS_ALLOWED_ORIGINS: ${APP_BASE_URL}
      SENTRY_DSN: ${SENTRY_DSN_API:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: arcadeforge-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../services/reverse-proxy/nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    depends_on:
      - api

  certbot:
    image: certbot/certbot
    container_name: arcadeforge-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done'"

volumes:
  pgdata:
  certbot-etc:
  certbot-var:
  certbot-webroot:
