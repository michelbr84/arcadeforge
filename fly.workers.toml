# Fly.io configuration for arq workers
# Deploy: fly deploy -c fly.workers.toml --remote-only
app = "arcadeforge-workers"
primary_region = "iad"

[build]
  dockerfile = "workers/Dockerfile.cloud"

[processes]
  generator = "arq workers.generator.worker.WorkerSettings"
  validator = "arq workers.validator.worker.WorkerSettings"
  sandbox   = "arq workers.sandbox.worker.WorkerSettings"

[env]
  APP_ENV = "production"
  LOG_LEVEL = "INFO"
  PYTHONPATH = "/app/apps/api:/app"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
