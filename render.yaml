# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect repo at https://dashboard.render.com/select-repo?type=blueprint

services:
  - type: web
    name: arcadeforge-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile.cloud
    dockerContext: ./apps/api
    region: ohio
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: APP_SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: REDIS_URL
        sync: false
      - key: STORAGE_DRIVER
        value: local
      - key: COOKIE_SECURE
        value: "true"
      - key: LOG_LEVEL
        value: INFO
